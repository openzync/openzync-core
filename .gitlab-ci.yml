# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — GitLab CI pipeline
# ──────────────────────────────────────────────────────────────────────────────
# Stages:
#   lint            → ruff, mypy
#   test-unit       → pytest with coverage
#   test-integration → pytest with real Postgres/Redis via CI services
#   build           → Docker image (main/tags only)
#
# Credentials: All database passwords use GitLab CI/CD masked variables.
#   $CI_DB_PASSWORD  — set in CI/CD Settings → CI/CD → Variables (masked).
#                      Defaults to 'postgres' for ephemeral CI containers only.
#   NEVER hardcode credentials in this file.
# ──────────────────────────────────────────────────────────────────────────────

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  COLUMNS: "120"
  # CI database — ephemeral service container, destroyed after pipeline run.
  # Override via CI/CD Settings → Variables → CI_DB_PASSWORD (masked)
  CI_DB_PASSWORD: "${CI_DB_PASSWORD:-postgres}"
  # JWT signing key for CI — override via CI/CD Settings → Variables → CI_SECRET_KEY (masked)
  CI_SECRET_KEY: "${CI_SECRET_KEY:-ci-secret-key-that-is-at-least-32-chars!!}"

stages:
  - lint
  - test-unit
  - test-integration
  - build
  - docs

default:
  image: python:3.12-slim
  cache:
    key: "$CI_COMMIT_REF_SLUG"
    paths:
      - .cache/pip/
      - .venv/

# ═══════════════════════════════════════════════════════════════════════════════
# LINT
# ═══════════════════════════════════════════════════════════════════════════════

ruff:
  stage: lint
  script:
    - pip install ruff
    - ruff check . --output-format=gitlab
    - ruff format --check .
  allow_failure: false

mypy:
  stage: lint
  script:
    - pip install mypy
    - pip install -e ".[dev]"
    - mypy core/ middleware/ dependencies/ routers/ models/ schemas/ services/
  allow_failure: true

# ═══════════════════════════════════════════════════════════════════════════════
# UNIT TESTS
# ═══════════════════════════════════════════════════════════════════════════════

test-unit:
  stage: test-unit
  script:
    - pip install -e ".[dev]"
    - pytest tests/unit/ -v --timeout=30
      --cov=core --cov=middleware --cov=dependencies
      --cov-report=term --cov-report=xml:coverage.xml
      -n auto
  coverage: '/TOTAL\s+\d+\s+\d+\s+(\d+)%/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: gocover
        path: coverage.xml

# ═══════════════════════════════════════════════════════════════════════════════
# INTEGRATION TESTS  (requires Postgres + Redis)
# ═══════════════════════════════════════════════════════════════════════════════
# Service containers are ephemeral — created per job and destroyed after.
# The password 'postgres' is the default for the official postgres:15 image.

test-integration:
  stage: test-integration
  services:
    - name: postgres:15
      alias: postgres
    - name: redis:7-alpine
      alias: redis
  variables:
    POSTGRES_PASSWORD: "$CI_DB_PASSWORD"
    POSTGRES_USER: postgres
    POSTGRES_DB: test
    OZ_DATABASE_URL: "postgresql+asyncpg://postgres:${CI_DB_PASSWORD}@postgres:5432/test"
    OZ_REDIS_URL: "redis://redis:6379/0"
    OZ_FALKORDB_URL: "redis://redis:6379/0"
    OZ_SECRET_KEY: "$CI_SECRET_KEY"
    OZ_ENVIRONMENT: "testing"
    OZ_LOG_LEVEL: "WARNING"
  before_script:
    - apt-get update -qq && apt-get install -y -qq postgresql-client >/dev/null 2>&1
    - PGPASSWORD="$CI_DB_PASSWORD" psql -h postgres -U postgres -c "CREATE DATABASE test;" 2>/dev/null || true
    - pip install -e ".[dev]"
  script:
    - alembic upgrade head
    - pytest tests/integration/ -v --timeout=60
      --cov=services --cov-report=term
  needs: ["test-unit"]

# ═══════════════════════════════════════════════════════════════════════════════
# BUILD  (Docker image — main branch and tags only)
# ═══════════════════════════════════════════════════════════════════════════════

build-api:
  stage: build
  image: docker:24
  services:
    - docker:dind
  variables:
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t openzync-api:${CI_COMMIT_SHORT_SHA:-latest} -f services/api/Dockerfile .
    - docker tag openzync-api:${CI_COMMIT_SHORT_SHA} openzync-api:latest
  needs: ["test-integration"]
  only:
    - main
    - tags
  except:
    - schedules

# ═══════════════════════════════════════════════════════════════════════════════
# SECURITY SCAN  (weekly schedule)
# ═══════════════════════════════════════════════════════════════════════════════

dependency-scan:
  stage: test-unit
  script:
    - pip install pip-audit
    - pip-audit
  only:
    - schedules

# ═══════════════════════════════════════════════════════════════════════════════
# DOCUMENTATION  (validate that Sphinx builds cleanly)
# ═══════════════════════════════════════════════════════════════════════════════
# Builds the Sphinx HTML docs and treats any warning as a build failure.
# Publishing is handled by ReadTheDocs (configured in .readthedocs.yaml).

docs:
  stage: docs
  script:
    - pip install -e ".[doc]"
    - sphinx-apidoc -o docs/api/ core/ routers/ models/ schemas/ services/
        repositories/ middleware/ dependencies/ workers/ utils/ packages/
        --force --module-first
    - sphinx-build -b html docs/ docs/_build/html
  only:
    - main
  except:
    - schedules
