# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — Backend Stack (v2: zero-fallback secrets bootstrap)
# ──────────────────────────────────────────────────────────────────────────────
# Self-contained: no external networks, no pre-created resources, no manual
# unseal. `docker compose -f infra/docker-compose.backend.yml up -d` brings
# the entire stack from a cold start to a working api + worker, with every
# secret auto-generated, stored in OpenBao, and rendered at runtime to the
# api/worker via OpenBao Agent sidecars.
#
# Service graph (default profile — no local database, Supabase/CloudSQL):
#
#   openbao ─► openbao-init ───────────────────────────────────┐
#                                                              │
#                ┌─────────────────────────────────────────────┘
#                ▼
#        openbao-agent-api            openbao-agent-worker
#           (sidecar)                     (sidecar)
#                │                           │
#                ▼                           ▼
#               api                        worker
#                │                           │
#                └─────────► redis ◄─────────┘
#
# With --profile local-db:
#
#   postgres ─► postgres-init ─► postgres-migrate ─► openbao-write-db
#                                                         │
#                ┌────────────────────────────────────────┘
#                ▼
#        openbao-agent-api ── (same as default graph above)
#
# One-shot services (exit 0, restart: no) sit on the critical path. Restart-
# loop services (openbao, postgres, api, worker, agent sidecars, redis) come
# up last and stay up.
#
# Secrets model:
#   - OpenBao holds the system secret at system/config/data/system as a
#     SINGLE flat object (REDIS_URL, SECRET_KEY, DATABASE_URL, JWT TTLs,
#     rate limits, etc.). The init_openbao.sh script writes the static OZ_*
#     env vars; write_db_to_openbao.sh appends DATABASE_URL once postgres
#     has minted the application credentials.
#   - Each app container has an OpenBao Agent sidecar that authenticates
#     via AppRole and renders the system secret to a shared volume as
#     /run/secrets/system.env (env-file format). The api/worker entrypoint
#     scripts wait for that file, source it, and exec the app.
#   - The migration container does NOT use an Agent sidecar — it reads the
#     migrator password directly from /bao-init/db-creds.json (the file
#     postgres-init wrote) via scripts/entrypoint_migrate.sh.
#
# Volume note:
#   api-secrets and worker-secrets are regular named volumes (not tmpfs)
#   so the sidecar (writer) and the app (reader) can share a single path
#   across container boundaries. For production, replace them with
#   tmpfs mounts (e.g. Kubernetes emptyDir.medium: Memory) — see the
#   `# TechLead note:` in the services block.
#
# Profiles:
#   --profile llm            (Ollama)
#   --profile observability  (Prometheus + Grafana + Alloy)
#   --profile local-db       (Postgres + init + migrate + write-db to OpenBao)
#
# Required env vars (no defaults — compose will refuse to start if absent):
#   BAO_STATIC_SEAL_KEY      64-char hex (openssl rand -hex 32)
#   OZ_SECRET_KEY            app SECRET_KEY (stored in OpenBao system secret)
#   OZ_WEBHOOK_SIGNING_SECRET app webhook signing secret
#
# Required with --profile local-db (only):
#   POSTGRES_PASSWORD        superuser password for first-boot cluster init
#
# Optional env vars (defaults shown):
#   OZ_ENVIRONMENT=development
#   OZ_CORS_ORIGINS=http://localhost:3000
#   OZ_LOG_LEVEL=INFO
#   OZ_MAX_WORKERS=4
#   OZ_JWT_ACCESS_TOKEN_TTL_MINUTES=30
#   OZ_JWT_REFRESH_TOKEN_TTL_DAYS=7
#   OZ_PROMETHEUS_URL=http://prometheus:9090
#   OZ_FALKORDB_URL=redis://redis:6379
#   OZ_FALKORDB_MAX_CONNECTIONS=20
#   OZ_FALKORDB_SOCKET_TIMEOUT=30
#   OZ_RATE_LIMIT_IP_MAX=10
#   OZ_RATE_LIMIT_WINDOW_SEC=60
# ──────────────────────────────────────────────────────────────────────────────

# ── Logging defaults ─────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── 1. OpenBao (secrets management) ───────────────────────────────────────
  # The Raft storage backend holds KV data; the static_kv seal wraps the
  # master key with BAO_STATIC_SEAL_KEY so the server auto-unseals on
  # every restart. cap_add: IPC_LOCK lets the seal hold memory pages.
  openbao:
    image: openbao/openbao:2.5
    container_name: openzync-openbao
    # The image drops to the openbao user (UID 100) via su-exec, which can't write
    # to the root-owned /vault/data volume.  chown the volume first, then run the
    # stock entrypoint so it can proceed without permission errors.
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command: ["/bin/sh", "-c", "chown -R openbao:openbao /vault/data 2>/dev/null; exec /usr/local/bin/docker-entrypoint.sh server -config=/etc/openbao/config.hcl"]
    cap_add: [IPC_LOCK]
    ports: ["127.0.0.1:8200:8200"]
    volumes:
      - openbao-data:/vault/data
      - ./openbao/config.hcl:/etc/openbao/config.hcl:ro,z
      - openbao-audit-logs:/vault/logs
    environment:
      BAO_STATIC_SEAL_KEY: "${BAO_STATIC_SEAL_KEY:?BAO_STATIC_SEAL_KEY is required (generate with: openssl rand -hex 32)}"
      BAO_ADDR: "http://0.0.0.0:8200"
    healthcheck:
      # Healthy only when initialised AND unsealed. `bao status` returns
      # valid JSON in both states; the sealed flag flips to false once
      # the static seal has decrypted the master key.
      test: ["CMD-SHELL", "bao status -address http://127.0.0.1:8200 -format=json 2>&1 | grep -q '\"sealed\": *false'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  # ── 2. OpenBao init (one-shot bootstrap) ──────────────────────────────────
  # Idempotent (marker file in /bao-init). On first run: init + unseal +
  # write the static OZ_* system secret + create AppRoles + write role_id /
  # secret_id files for the api/worker Agent sidecars. On subsequent runs:
  # short-circuits to exit 0 once the marker is present.
  openbao-init:
    build:
      context: .
      dockerfile: Dockerfile.openbao-tooling
    container_name: openzync-openbao-init
    depends_on:
      openbao:
        condition: service_started   # script has its own retry logic
    environment:
      BAO_ADDR: "http://openbao:8200"
      BAO_SKIP_VERIFY: "true"
      # All OZ_* env vars are written to the system secret (lowercase snake_case keys).
      # DATABASE_URL is intentionally NOT here — write_db_to_openbao.sh
      # appends it after postgres-init + postgres-migrate complete.
      OZ_REDIS_URL: "redis://redis:6379/0"
      OZ_SECRET_KEY: "${OZ_SECRET_KEY:?OZ_SECRET_KEY is required for system secret}"
      OZ_ENVIRONMENT: "${OZ_ENVIRONMENT:-development}"
      OZ_CORS_ORIGINS: "${OZ_CORS_ORIGINS:-http://localhost:3000}"
      OZ_LOG_LEVEL: "${OZ_LOG_LEVEL:-INFO}"
      OZ_MAX_WORKERS: "${OZ_MAX_WORKERS:-4}"
      OZ_JWT_ACCESS_TOKEN_TTL_MINUTES: "${OZ_JWT_ACCESS_TOKEN_TTL_MINUTES:-30}"
      OZ_JWT_REFRESH_TOKEN_TTL_DAYS: "${OZ_JWT_REFRESH_TOKEN_TTL_DAYS:-7}"
      OZ_WEBHOOK_SIGNING_SECRET: "${OZ_WEBHOOK_SIGNING_SECRET:?OZ_WEBHOOK_SIGNING_SECRET is required}"
      OZ_PROMETHEUS_URL: "${OZ_PROMETHEUS_URL:-http://prometheus:9090}"
      OZ_FALKORDB_URL: "${OZ_FALKORDB_URL:-redis://redis:6379}"
      OZ_FALKORDB_MAX_CONNECTIONS: "${OZ_FALKORDB_MAX_CONNECTIONS:-20}"
      OZ_FALKORDB_SOCKET_TIMEOUT: "${OZ_FALKORDB_SOCKET_TIMEOUT:-30}"
      OZ_RATE_LIMIT_IP_MAX: "${OZ_RATE_LIMIT_IP_MAX:-10}"
      OZ_RATE_LIMIT_WINDOW_SEC: "${OZ_RATE_LIMIT_WINDOW_SEC:-60}"
      OZ_HOSTS_ALLOWED: "${OZ_HOSTS_ALLOWED:-localhost:8000}"
      OZ_PROMPT_CACHING_ENABLED: "${OZ_PROMPT_CACHING_ENABLED:-true}"
      OZ_PROMPT_CACHING_ANTHROPIC_MIN_TOKENS: "${OZ_PROMPT_CACHING_ANTHROPIC_MIN_TOKENS:-1024}"
      OZ_PROMPT_CACHING_ANTHROPIC_TTL: "${OZ_PROMPT_CACHING_ANTHROPIC_TTL:-5m}"
      OZ_DATABASE_URL: "${OZ_DATABASE_URL:-}"
    volumes:
      # Shared init volume — every downstream step reads or writes files
      # here (unseal keys, AppRole creds, db-creds.json, write markers).
      - openbao-init-data:/bao-init
      - ./openbao/policies:/policies:ro
      - ../scripts/init_openbao.sh:/init_openbao.sh:ro
    entrypoint: ["/bin/sh", "/init_openbao.sh"]
    logging: *default-logging
    restart: "no"

  # ── 3. Postgres (database) ────────────────────────────────────────────────
  # pgvector image ships the vector extension types required by the
  # embeddings schema. POSTGRES_PASSWORD must be set on FIRST boot;
  # subsequent restarts use the password stored in postgres-data.
  postgres:
    profiles: [local-db]
    image: pgvector/pgvector:pg15
    container_name: openzync-postgres
    ports: ["127.0.0.1:5432:5432"]
    environment:
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-}"
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging: *default-logging
    restart: unless-stopped

  # ── 4. Postgres init (one-shot — create DB + users) ──────────────────────
  # Creates the openzync database and two roles:
  #   openzync_migrator  DDL (used by alembic upgrade head)
  #   openzync_app       CRUD (used by api + worker at runtime)
  # Always auto-generates fresh migrator + app passwords (rotation-friendly)
  # and writes the JSON to /bao-init/db-creds.json for downstream steps.
  # If POSTGRES_SUPERUSER_PASSWORD matches the env-provided POSTGRES_PASSWORD,
  # the superuser is left untouched (so subsequent restarts still work).
  postgres-init:
    profiles: [local-db]
    image: pgvector/pgvector:pg15
    container_name: openzync-postgres-init
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      DB_NAME: openzync
      # POSTGRES_SUPERUSER_PASSWORD is optional. If set, the script uses it
      # and does NOT rotate the superuser. If unset, the script auto-generates
      # one and rotates the superuser (preferred for zero-fallback).
      # We pass POSTGRES_PASSWORD so the superuser password matches what
      # the postgres container used for first-boot cluster init.
      POSTGRES_SUPERUSER_PASSWORD: "${POSTGRES_PASSWORD:-}"
    volumes:
      - openbao-init-data:/bao-init
      - ../scripts/init_postgres.sh:/init_postgres.sh:ro
    entrypoint: ["/bin/bash", "/init_postgres.sh"]
    logging: *default-logging
    restart: "no"

  # ── 5. Postgres migrate (one-shot — alembic upgrade head) ────────────────
  # Reads the migrator password from /bao-init/db-creds.json (the file
  # postgres-init wrote) and constructs DATABASE_URL on the fly. No
  # OpenBao Agent sidecar — the migrator URL differs from the app URL,
  # so reusing the api/worker Agent config would mean either widening
  # the template or forking the AppRole policy. The direct-read approach
  # is lighter and still uses the shared init volume for the credential.
  postgres-migrate:
    profiles: [local-db]
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    image: openzync-api:latest
    container_name: openzync-postgres-migrate
    depends_on:
      postgres-init:
        condition: service_completed_successfully
    environment:
      OZ_ENVIRONMENT: development   # suppress any prod-only startup checks
    volumes:
      - openbao-init-data:/bao-init:ro
      - ../scripts/entrypoint_migrate.sh:/entrypoint_migrate.sh:ro
    entrypoint: ["/bin/sh", "/entrypoint_migrate.sh"]
    command: ["alembic", "upgrade", "head"]
    logging: *default-logging
    restart: "no"

  # ── 6. OpenBao write-db (one-shot — inject DB creds into KV) ─────────────
  # Reads the existing system secret from OpenBao, merges DATABASE_URL
  # (built from db-creds.json) into it, and writes the merged result
  # back. After this step, the system secret contains every key the
  # api/worker Agent templates render.
  openbao-write-db:
    profiles: [local-db]
    build:
      context: .
      dockerfile: Dockerfile.openbao-tooling
    container_name: openzync-openbao-write-db
    depends_on:
      postgres-migrate:
        condition: service_completed_successfully
    volumes:
      - openbao-init-data:/bao-init
      - ../scripts/write_db_to_openbao.sh:/write_db_to_openbao.sh:ro
    entrypoint: ["/bin/bash", "/write_db_to_openbao.sh"]
    logging: *default-logging
    restart: "no"

  # ── 7a. OpenBao Agent for api (sidecar) ──────────────────────────────────
  # Authenticates as AppRole 'openzync-app' and renders system config to
  # /openbao/agent/system.env (shared volume → /run/secrets/system.env in
  # the api container). entrypoint_api.sh waits for that file before
  # exec'ing uvicorn.
  #
  # TechLead note: api-secrets is a regular named volume here (NOT tmpfs)
  # because the sidecar (writer) and the api (reader) must share a single
  # path. In production / Kubernetes, replace this with a tmpfs-backed
  # emptyDir (medium: Memory) at the pod spec level — the compose
  # abstraction can't express a shared tmpfs across two containers.
  openbao-agent-api:
    image: openbao/openbao:2.5
    container_name: openzync-openbao-agent-api
    depends_on:
      openbao-init:
        condition: service_completed_successfully
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command: ["/bin/sh", "-c", "chown -R openbao:openbao /openbao/agent 2>/dev/null; exec bao agent -config=/etc/bao/agent.hcl"]
    environment:
      VAULT_NAMESPACE: "system/"
    volumes:
      - openbao-init-data:/openbao-bootstrap:ro
      - api-secrets:/openbao/agent:rw
      - ./openbao/agent/api.hcl:/etc/bao/agent.hcl:ro
    healthcheck:
      # Healthy once system.env exists AND contains OZ_SECRET_KEY= (the
      # key every system secret must have after openbao-init completes).
      test: ["CMD-SHELL", "test -s /openbao/agent/system.env && grep -q '^OZ_SECRET_KEY=' /openbao/agent/system.env"]
      interval: 5s
      timeout: 3s
      retries: 18   # 90s total — covers first-time auth + render
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  # ── 7b. API service ──────────────────────────────────────────────────────
  # The api entrypoint (/entrypoint_api.sh, baked into the image) blocks
  # until /run/secrets/system.env appears, sources it, then execs uvicorn
  # so the worker becomes PID 1 and receives SIGTERM directly.
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    image: ghcr.io/rohnsha0/openzync/api:latest
    container_name: openzync-api
    environment:
      # OZ_OPENBAO_ADDR tells the api code where to find OpenBao at runtime
      # (for org namespace management, transit decrypt, etc.). All other
      # OZ_* vars come from /run/secrets/system.env (rendered by the Agent).
      OZ_OPENBAO_ADDR: "http://openbao:8200"
      UVICORN_WORKERS: "1"
    depends_on:
      openbao-agent-api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - api-secrets:/run/secrets:ro   # RO — the app must never write secrets
      - openbao-init-data:/openbao-bootstrap:ro  # AppRole credentials for runtime auth
    ports: ["127.0.0.1:8000:8000"]
    deploy:
      resources:
        limits: { cpus: "1", memory: "2G" }
        reservations: { cpus: "0.5", memory: "1G" }
    logging: *default-logging
    restart: unless-stopped

  # ── 8a. OpenBao Agent for worker (sidecar) ───────────────────────────────
  # Same pattern as the api sidecar, but uses the 'openzync-worker'
  # AppRole (read-only policy — workers never write org config).
  openbao-agent-worker:
    image: openbao/openbao:2.5
    container_name: openzync-openbao-agent-worker
    depends_on:
      openbao-init:
        condition: service_completed_successfully
    entrypoint: ["/usr/bin/dumb-init", "--"]
    command: ["/bin/sh", "-c", "chown -R openbao:openbao /openbao/agent 2>/dev/null; exec bao agent -config=/etc/bao/agent.hcl"]
    environment:
      VAULT_NAMESPACE: "system/"
    volumes:
      - openbao-init-data:/openbao-bootstrap:ro
      - worker-secrets:/openbao/agent:rw
      - ./openbao/agent/worker.hcl:/etc/bao/agent.hcl:ro
    healthcheck:
      test: ["CMD-SHELL", "test -s /openbao/agent/system.env && grep -q '^OZ_SECRET_KEY=' /openbao/agent/system.env"]
      interval: 5s
      timeout: 3s
      retries: 18
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  # ── 8b. Worker service ───────────────────────────────────────────────────
  # ARQ worker. entrypoint_worker.sh (baked into the image) waits for
  # /run/secrets/system.env, sources it, then execs the worker loop.
  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    image: ghcr.io/rohnsha0/openzync/worker:latest
    container_name: openzync-worker
    environment:
      OZ_OPENBAO_ADDR: "http://openbao:8200"
    depends_on:
      openbao-agent-worker:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - worker-secrets:/run/secrets:ro
      - openbao-init-data:/openbao-bootstrap:ro  # AppRole credentials for runtime auth
    deploy:
      resources:
        limits: { cpus: "0.5", memory: "1G" }
    logging: *default-logging
    restart: unless-stopped

  # ── Redis (caching, queues, pub/sub) ─────────────────────────────────────
  # api + worker depend on this with service_healthy so the redis-cli PING
  # must pass before the app containers can start.
  redis:
    image: redis:7-alpine
    ports: ["127.0.0.1:6379:6379"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── Ollama (local LLM inference) — OPTIONAL ──────────────────────────────
  ollama:
    profiles: [llm]
    image: ollama/ollama:latest
    ports: ["11434:11434"]
    volumes:
      - ollama-data:/root/.ollama
    logging: *default-logging
    restart: unless-stopped

  # ── Prometheus (metrics storage) — OPTIONAL ──────────────────────────────
  # extra_hosts lets the scrape config reach the api at host.docker.internal
  # (compose v2+ maps this to the host gateway on macOS/Windows and the
  # host's bridge on Linux). For Linux on a custom network, switch the
  # scrape target to `api:8000` instead.
  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.53.0
    ports: ["9090:9090"]
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana (visualisation dashboards) — OPTIONAL ────────────────────────
  grafana:
    profiles: [observability]
    image: grafana/grafana:11.0.0
    ports: ["127.0.0.1:3000:3000"]
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"        # read-only — was Admin before audit
      GF_SECURITY_ADMIN_PASSWORD: admin            # dev-only; set via env in production
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana Alloy (OpenTelemetry collector) — OPTIONAL ───────────────────
  alloy:
    profiles: [observability]
    image: grafana/alloy:latest
    ports:
      - "4317:4317"
      - "12345:12345"
    volumes:
      - ./alloy:/etc/alloy:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    logging: *default-logging
    restart: unless-stopped

# ── Named volumes ────────────────────────────────────────────────────────────
# openbao-data:        Raft storage + seal
# openbao-init-data:   Shared bootstrap artefacts (unseal keys, root token,
#                      AppRole role_id/secret_id files, db-creds.json, markers)
# postgres-data:       Postgres data directory
# api-secrets:         Sidecar (writer) + api (reader) shared render path
# worker-secrets:      Sidecar (writer) + worker (reader) shared render path
# ⚠️ Production: replace api-secrets and worker-secrets with tmpfs-backed
#    mounts (Kubernetes emptyDir.medium: Memory, or `--tmpfs /run/secrets`
#    on a swarm config). Compose can't express a shared tmpfs between two
#    containers, so we use regular named volumes here as a portable default.
networks:
  default:
    name: openzync_network

volumes:
  redis-data: {}
  ollama-data: {}
  grafana-data: {}
  prometheus-data: {}
  openbao-audit-logs: {}
  openbao-data: {}
  openbao-init-data: {}
  postgres-data: {}
  api-secrets: {}
  worker-secrets: {}
