# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — Backend Stack
# ──────────────────────────────────────────────────────────────────────────────
# Self-contained: no external networks, no pre-created resources.
#
# Default profile runs api + worker + redis.
# Optional profiles:  --profile llm  (Ollama)
#                     --profile observability  (Prometheus + Grafana + Alloy)
#
# Usage:
#   docker compose -f infra/docker-compose.backend.yml up -d
#   docker compose -f infra/docker-compose.backend.yml --profile llm up -d
#   docker compose -f infra/docker-compose.backend.yml --profile observability up -d
# ──────────────────────────────────────────────────────────────────────────────

# ── Logging defaults ─────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── FastAPI API server ────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    image: ghcr.io/rohnsha0/openzync/api:latest
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "1G"
    logging: *default-logging
    restart: unless-stopped

  # ── ARQ background worker ─────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    image: ghcr.io/rohnsha0/openzync/worker:latest
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: INFO
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "1G"
    logging: *default-logging
    restart: unless-stopped

  # ── Redis (caching, queues, pub/sub) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── Ollama (local LLM inference) — OPTIONAL ───────────────────────────────
  ollama:
    profiles: [llm]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    logging: *default-logging
    restart: unless-stopped

  # ── Prometheus (metrics storage) — OPTIONAL ───────────────────────────────
  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana (visualisation dashboards) — OPTIONAL ─────────────────────────
  grafana:
    profiles: [observability]
    image: grafana/grafana:11.0.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"        # read-only — was Admin before audit
      GF_SECURITY_ADMIN_PASSWORD: admin            # dev-only; set via env in production
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana Alloy (OpenTelemetry collector) — OPTIONAL ────────────────────
  alloy:
    profiles: [observability]
    image: grafana/alloy:latest
    ports:
      - "4317:4317"
      - "12345:12345"
    volumes:
      - ./alloy:/etc/alloy:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    logging: *default-logging
    restart: unless-stopped

volumes:
  redis-data:
  ollama-data:
  grafana-data:
  prometheus-data:
