# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — Backend Stack
# ──────────────────────────────────────────────────────────────────────────────
# Self-contained: no external networks, no pre-created resources.
#
# Default profile runs api + worker + redis.
# Optional profiles:  --profile llm  (Ollama)
#                     --profile observability  (Prometheus + Grafana + Alloy)
#
# Usage:
#   docker compose -f infra/docker-compose.backend.yml up -d
#   docker compose -f infra/docker-compose.backend.yml --profile llm up -d
#   docker compose -f infra/docker-compose.backend.yml --profile observability up -d
# ──────────────────────────────────────────────────────────────────────────────

# ── Logging defaults ─────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── FastAPI API server ────────────────────────────────────────────────────
  api:
    build:
      context: ..
      dockerfile: services/api/Dockerfile
    image: ghcr.io/rohnsha0/openzync/api:latest
    environment:
      OZ_OPENBAO_ADDR: http://openbao:8200
      OZ_OPENBAO_ROLE_ID: "${OZ_OPENBAO_ROLE_ID}"
      OZ_OPENBAO_SECRET_ID: "${OZ_OPENBAO_SECRET_ID}"
      REDIS_URL: redis://redis:6379/0
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
    depends_on:
      redis:
        condition: service_healthy
      openbao:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: "2G"
        reservations:
          cpus: "0.5"
          memory: "1G"
    logging: *default-logging
    restart: unless-stopped

  # ── ARQ background worker ─────────────────────────────────────────────────
  worker:
    build:
      context: ..
      dockerfile: services/worker/Dockerfile
    image: ghcr.io/rohnsha0/openzync/worker:latest
    environment:
      OZ_OPENBAO_ADDR: http://openbao:8200
      OZ_OPENBAO_ROLE_ID: "${OZ_OPENBAO_ROLE_ID}"
      OZ_OPENBAO_SECRET_ID: "${OZ_OPENBAO_SECRET_ID}"
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
      openbao:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "1G"
    logging: *default-logging
    restart: unless-stopped

  # ── Redis (caching, queues, pub/sub) ──────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── OpenBao (secrets management) ──────────────────────────────────────────
  openbao:
    image: openbao/openbao:2.5
    container_name: openzync-openbao
    cap_add:
      - IPC_LOCK
    ports:
      - "127.0.0.1:8200:8200"
    volumes:
      - openbao-data:/vault/data
      - ./openbao/config.hcl:/etc/openbao/config.hcl:ro
    environment:
      BAO_STATIC_SEAL_KEY: "${BAO_STATIC_SEAL_KEY?BAO_STATIC_SEAL_KEY is required}"
      BAO_ADDR: "http://0.0.0.0:8200"
    command: server -config /etc/openbao/config.hcl
    healthcheck:
      # Returns healthy when OpenBao is initialized AND unsealed.
      test: ["CMD-SHELL", "bao status -address http://127.0.0.1:8200 -format=json 2>&1 | grep -q '\"sealed\":false'"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    logging: *default-logging
    restart: unless-stopped

  # ── OpenBao init (one-shot bootstrap) ─────────────────────────────────────
  openbao-init:
    image: openbao/openbao:2.5
    container_name: openzync-openbao-init
    depends_on:
      openbao:
        condition: service_started
    environment:
      BAO_ADDR: "http://openbao:8200"
      BAO_SKIP_VERIFY: "true"
      OZ_DATABASE_URL: "${OZ_DATABASE_URL}"
      OZ_REDIS_URL: "${OZ_REDIS_URL}"
      OZ_SECRET_KEY: "${OZ_SECRET_KEY}"
      OZ_ENVIRONMENT: "${OZ_ENVIRONMENT:-development}"
      OZ_CORS_ORIGINS: "${OZ_CORS_ORIGINS:-http://localhost:3000}"
      OZ_LOG_LEVEL: "${OZ_LOG_LEVEL:-INFO}"
      OZ_MAX_WORKERS: "${OZ_MAX_WORKERS:-4}"
      OZ_JWT_ACCESS_TOKEN_TTL_MINUTES: "${OZ_JWT_ACCESS_TOKEN_TTL_MINUTES:-30}"
      OZ_JWT_REFRESH_TOKEN_TTL_DAYS: "${OZ_JWT_REFRESH_TOKEN_TTL_DAYS:-7}"
      OZ_WEBHOOK_SIGNING_SECRET: "${OZ_WEBHOOK_SIGNING_SECRET}"
      OZ_PROMETHEUS_URL: "${OZ_PROMETHEUS_URL:-http://prometheus:9090}"
      OZ_FALKORDB_URL: "${OZ_FALKORDB_URL:-redis://redis:6379}"
      OZ_FALKORDB_MAX_CONNECTIONS: "${OZ_FALKORDB_MAX_CONNECTIONS:-20}"
      OZ_FALKORDB_SOCKET_TIMEOUT: "${OZ_FALKORDB_SOCKET_TIMEOUT:-30}"
      OZ_RATE_LIMIT_IP_MAX: "${OZ_RATE_LIMIT_IP_MAX:-10}"
      OZ_RATE_LIMIT_WINDOW_SEC: "${OZ_RATE_LIMIT_WINDOW_SEC:-60}"
    volumes:
      - openbao-init-data:/bao-init
      - ./openbao/policies:/policies:ro
      - ../scripts/init_openbao.sh:/init_openbao.sh:ro
    entrypoint: ["/bin/sh", "/init_openbao.sh"]
    logging: *default-logging
    restart: "no"

  # ── Ollama (local LLM inference) — OPTIONAL ───────────────────────────────
  ollama:
    profiles: [llm]
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    logging: *default-logging
    restart: unless-stopped

  # ── Prometheus (metrics storage) — OPTIONAL ───────────────────────────────
  prometheus:
    profiles: [observability]
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana (visualisation dashboards) — OPTIONAL ─────────────────────────
  grafana:
    profiles: [observability]
    image: grafana/grafana:11.0.0
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Viewer"        # read-only — was Admin before audit
      GF_SECURITY_ADMIN_PASSWORD: admin            # dev-only; set via env in production
    volumes:
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana Alloy (OpenTelemetry collector) — OPTIONAL ────────────────────
  alloy:
    profiles: [observability]
    image: grafana/alloy:latest
    ports:
      - "4317:4317"
      - "12345:12345"
    volumes:
      - ./alloy:/etc/alloy:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    logging: *default-logging
    restart: unless-stopped

volumes:
  redis-data:
  ollama-data:
  grafana-data:
  prometheus-data:
  openbao-data:
  openbao-init-data:
