# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — Frontend
# ──────────────────────────────────────────────────────────────────────────────
# Standalone — does not reference any backend services or external networks.
# Frontend reaches the API through the VPS nginx reverse proxy.
#
# Usage:
#   docker compose -f infra/docker-compose.frontend.yml up -d
#   docker compose -f infra/docker-compose.frontend.yml pull frontend
# ──────────────────────────────────────────────────────────────────────────────

services:
  # ── Next.js frontend ─────────────────────────────────────────────────────
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: ghcr.io/rohnsha0/openzync/frontend:latest
    ports:
      - "3000:3000"
    env_file: ../.env
    restart: unless-stopped
