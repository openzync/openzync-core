version: "3.9"

# ── Logging defaults ─────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── FastAPI gateway ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    # No host port — API is reached through nginx reverse proxy.
    # For local dev, add `docker compose -f docker-compose.override.yml`
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      OLLAMA_BASE_URL: http://ollama:11434
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      LOG_LEVEL: DEBUG
    depends_on:
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # ── ARQ background worker ──────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      LOG_LEVEL: DEBUG
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # ── Redis (caching, queues, pub/sub) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── Ollama (local LLM inference) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - llm
    logging: *default-logging
    restart: unless-stopped

  # ── Prometheus (metrics storage) ───────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.53.0
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus:/etc/prometheus:ro,z
      - prometheus-data:/prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    profiles:
      - observability
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana (visualisation dashboards) ─────────────────────────────────────
  grafana:
    image: grafana/grafana:11.0.0
    ports:
      - "3000:3000"
    environment:
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: "Admin"
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/datasources:/etc/grafana/provisioning/datasources:ro,z
      - ./grafana/dashboards:/etc/grafana/provisioning/dashboards:ro,z
    profiles:
      - observability
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana Alloy (OpenTelemetry collector) ────────────────────────────────
  alloy:
    image: grafana/alloy:latest
    ports:
      - "4317:4317"
      - "12345:12345"
    volumes:
      - ./alloy:/etc/alloy:ro,z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command:
      run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    profiles:
      - observability
    logging: *default-logging
    restart: unless-stopped

volumes:
  redis-data:
  ollama-data:
  grafana-data:
  prometheus-data:
