version: "3.9"

# ── Logging defaults ─────────────────────────────────────────────────────────
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ── FastAPI gateway ────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memgraph:memgraph@postgres:5432/memgraph
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: redis://falkordb:6380
      OLLAMA_BASE_URL: http://ollama:11434
      OTEL_EXPORTER_OTLP_ENDPOINT: http://alloy:4317
      LOG_LEVEL: DEBUG
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      falkordb:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # ── ARQ background worker ──────────────────────────────────────────────────
  worker:
    build:
      context: .
      dockerfile: services/worker/Dockerfile
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://memgraph:memgraph@postgres:5432/memgraph
      REDIS_URL: redis://redis:6379/0
      FALKORDB_URL: redis://falkordb:6380
      LOG_LEVEL: DEBUG
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    logging: *default-logging
    restart: unless-stopped

  # ── PostgreSQL (with pgvector) ─────────────────────────────────────────────
  postgres:
    image: pgvector/pgvector:pg15
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: memgraph
      POSTGRES_PASSWORD: memgraph
      POSTGRES_DB: memgraph
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memgraph"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── FalkorDB (graph database for agent memory) ────────────────────────────
  falkordb:
    image: falkordb/falkordb:latest
    ports:
      - "6380:6380"
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6380", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── Redis (caching, queues, pub/sub) ───────────────────────────────────────
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "PING"]
      interval: 5s
      timeout: 5s
      retries: 5
    logging: *default-logging
    restart: unless-stopped

  # ── Ollama (local LLM inference) ───────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    profiles:
      - llm
    logging: *default-logging
    restart: unless-stopped

  # ── Grafana Alloy (OpenTelemetry collector) ────────────────────────────────
  alloy:
    image: grafana/alloy:latest
    ports:
      - "4317:4317"
    volumes:
      - ./infra/alloy:/etc/alloy
    command:
      run --server.http.listen-addr=0.0.0.0:12345 /etc/alloy/config.alloy
    profiles:
      - observability
    logging: *default-logging
    restart: unless-stopped

volumes:
  pgdata:
  redis-data:
  ollama-data:
