{{- if or .Values.secrets.databaseUrl .Values.secrets.redisUrl .Values.secrets.secretKey }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openzync.fullname" . }}-secrets
  labels:
    {{- include "openzync.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- if .Values.secrets.databaseUrl }}
  OZ_DATABASE_URL: {{ .Values.secrets.databaseUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.redisUrl }}
  OZ_REDIS_URL: {{ .Values.secrets.redisUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.falkordbUrl }}
  OZ_FALKORDB_URL: {{ .Values.secrets.falkordbUrl | quote }}
  {{- end }}
  {{- if .Values.secrets.secretKey }}
  OZ_SECRET_KEY: {{ .Values.secrets.secretKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openaiApiKey }}
  OPENAI_API_KEY: {{ .Values.secrets.openaiApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.openrouterApiKey }}
  OPENROUTER_API_KEY: {{ .Values.secrets.openrouterApiKey | quote }}
  {{- end }}
  {{- if .Values.secrets.anthropicApiKey }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  {{- end }}
{{- end }}
