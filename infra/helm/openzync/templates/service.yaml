apiVersion: v1
kind: Service
metadata:
  name: {{ include "openzync.fullname" . }}-api
  labels:
    {{- include "openzync.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: {{ .Values.api.containerPort }}
      protocol: TCP
      name: http
  selector:
    {{- include "openzync.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
