apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openzync.fullname" . }}-api
  labels:
    {{- include "openzync.labels" . | nindent 4 }}
    app.kubernetes.io/component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  selector:
    matchLabels:
      {{- include "openzync.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        {{- include "openzync.labels" . | nindent 8 }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: "{{ .Values.global.imageRegistry }}/{{ .Values.api.image.repository }}:{{ .Values.api.image.tag }}"
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.api.containerPort }}
              name: http
          envFrom:
            - configMapRef:
                name: {{ include "openzync.fullname" . }}-config
            - secretRef:
                name: {{ include "openzync.fullname" . }}-secrets
                optional: true
          livenessProbe:
            httpGet:
              path: {{ .Values.api.health.path }}
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: {{ .Values.api.health.initialDelaySeconds }}
            periodSeconds: {{ .Values.api.health.periodSeconds }}
            timeoutSeconds: {{ .Values.api.health.timeoutSeconds }}
          readinessProbe:
            httpGet:
              path: /ready
              port: {{ .Values.api.containerPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
    {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
    {{- end }}
