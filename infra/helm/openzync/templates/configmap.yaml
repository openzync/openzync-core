apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "openzync.fullname" . }}-config
  labels:
    {{- include "openzync.labels" . | nindent 4 }}
data:
  OZ_ENVIRONMENT: {{ .Values.global.environment | quote }}
  OZ_LOG_LEVEL: {{ .Values.global.logLevel | quote }}
  OZ_LLM_BACKEND: {{ .Values.config.llmBackend | quote }}
  OZ_LLM_MODEL: {{ .Values.config.llmModel | quote }}
  OZ_EMBEDDING_BACKEND: {{ .Values.config.embeddingBackend | quote }}
  OZ_EMBEDDING_MODEL: {{ .Values.config.embeddingModel | quote }}
  OZ_EMBEDDING_DIM: {{ .Values.config.embeddingDim | quote }}
  OZ_GRAPH_BACKEND: {{ .Values.config.graphBackend | quote }}
  OZ_GRAPH_MAX_TRAVERSAL_DEPTH: {{ .Values.config.graphMaxTraversalDepth | quote }}
  OZ_CONTEXT_CACHE_TTL: {{ .Values.config.contextCacheTtl | quote }}
  OZ_JWT_ACCESS_TOKEN_TTL_MINUTES: {{ .Values.config.jwtAccessTokenTtlMinutes | quote }}
  OZ_JWT_REFRESH_TOKEN_TTL_DAYS: {{ .Values.config.jwtRefreshTokenTtlDays | quote }}
  OZ_RATE_LIMIT_IP_MAX: {{ .Values.config.rateLimitIpMax | quote }}
  OZ_RATE_LIMIT_WINDOW_SEC: {{ .Values.config.rateLimitWindowSec | quote }}
  OZ_CORS_ORIGINS: {{ .Values.config.corsOrigins | quote }}
  OZ_OTLP_ENDPOINT: {{ .Values.config.otlpEndpoint | quote }}
  OLLAMA_BASE_URL: {{ .Values.config.ollamaBaseUrl | quote }}
