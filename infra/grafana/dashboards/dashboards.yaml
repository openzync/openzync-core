# ──────────────────────────────────────────────────────────────────────────────
# Grafana dashboard provisioning — OpenZync
# ──────────────────────────────────────────────────────────────────────────────
# Auto-loads all JSON dashboard files from the dashboards directory.
# Reference: https://grafana.com/docs/grafana/latest/administration/provisioning/
# ──────────────────────────────────────────────────────────────────────────────

apiVersion: 1

providers:
  - name: "OpenZync"
    orgId: 1
    folder: "OpenZync"
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    options:
      path: /etc/grafana/provisioning/dashboards
