# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — VPS Production Overrides
# ──────────────────────────────────────────────────────────────────────────────
# Deploy alongside the base compose file:
#
#   docker compose \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.prod.yml \
#     -f infra/docker-compose.vps.yml \
#     up -d --build
#
# Covers:
#   - nginx reverse proxy (HTTP, IP-based)
#   - Production log levels & env overrides
#   - Health check dependencies
# ──────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./nginx/conf.d:/etc/nginx/conf.d:ro,z
      - ./nginx/certs:/etc/nginx/certs:ro,z
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "nginx"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API overrides ───────────────────────────────────────────────────────
  api:
    # Pull pre-built image from ghcr.io instead of building locally.
    # Pushed by the CI build job on every push to main.
    image: ghcr.io/rohnsha0/openzync/api:latest
    # Single worker: 1-CPU VPS can't handle multiprocessing
    command: ["uvicorn", "services.api.asgi:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: "2G"
    environment:
      OZ_ENVIRONMENT: production
      OZ_LOG_LEVEL: INFO
      # ⚠️ Update OZ_CORS_ORIGINS and OZ_HOSTS_ALLOWED in your .env file
      #    to match your frontend domain.
    # No host port — API is reached through nginx reverse proxy.

  # ── Frontend ─────────────────────────────────────────────────────────────
  frontend:
    image: ghcr.io/rohnsha0/openzync/frontend:latest
    # No host port — served through nginx reverse proxy.
    env_file:
      - .env
    depends_on:
      - api
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "512M"
    restart: unless-stopped

  # ── Worker overrides ─────────────────────────────────────────────────────
  worker:
    image: ghcr.io/rohnsha0/openzync/worker:latest
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: "1G"


