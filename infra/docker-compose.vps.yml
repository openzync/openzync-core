# ──────────────────────────────────────────────────────────────────────────────
# OpenZep — VPS Production Overrides
# ──────────────────────────────────────────────────────────────────────────────
# Deploy alongside the base compose file:
#
#   docker compose \
#     -f infra/docker-compose.yml \
#     -f infra/docker-compose.vps.yml \
#     -f infra/docker-compose.prod.yml \
#     up -d --build
#
# Covers:
#   - nginx reverse proxy (HTTP, IP-based)
#   - Production log levels & env overrides
#   - Shared backup volume for PostgreSQL
#   - Health check dependencies
# ──────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── Reverse proxy ───────────────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro,z
      - ./nginx/conf.d:/etc/nginx/conf.d:ro,z
    depends_on:
      - api
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ── API overrides ───────────────────────────────────────────────────────
  api:
    # Pull pre-built image from ghcr.io instead of building locally.
    # Pushed by the CI build job on every push to main.
    image: ghcr.io/rohnsha0/openzep/api:latest
    environment:
      MG_ENVIRONMENT: production
      MG_LOG_LEVEL: INFO
      # ⚠️ Update MG_CORS_ORIGINS and MG_HOSTS_ALLOWED in your .env file
      #    to match your frontend domain.
    # Port 8000 is exposed internally only — nginx sits in front.
    ports:
      - "8000"

  # ── Worker overrides ─────────────────────────────────────────────────────
  worker:
    image: ghcr.io/rohnsha0/openzep/worker:latest

  # ── PostgreSQL ──────────────────────────────────────────────────────────
  postgres:
    volumes:
      - pgdata:/var/lib/postgresql/data
      - backup-data:/backups:z

volumes:
  backup-data:
    driver: local
