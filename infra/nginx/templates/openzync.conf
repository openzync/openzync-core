# ╔══════════════════════════════════════════════════════════════════════════╗
# ║  TEMPLATE — copy to ../conf.d/openzync.conf to activate                 ║
# ║  This file is NOT deployed by CI.  Apply manually:                      ║
# ║    cp infra/nginx/templates/openzync.conf infra/nginx/conf.d/           ║
# ╚══════════════════════════════════════════════════════════════════════════╝
# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — HTTP reverse proxy (IP-based, no TLS)
# ──────────────────────────────────────────────────────────────────────────────
# Used when deploying without a domain name.  If you add a domain later,
# replace `server_name` and add the HTTPS server block from
# infra/nginx/conf.d/openzync.ssl.conf.
#
# Routing:
#   /v1/*, /docs, /openapi.json, /health → FastAPI backend (api:8000)
#   Everything else                      → Next.js frontend (frontend:3000)
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Respond on any IP/domain

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Upstream resolver for variable proxy_pass ─────────────────────────
    # NOTE: proxy_pass must use a variable ($api_upstream, $frontend_upstream)
    # so nginx re-resolves DNS at runtime.  Fixed-string proxy_pass resolves
    # once at startup and caches the IP forever — container IP changes after
    # redeploy cause 502 Bad Gateway until nginx is reloaded.
    resolver 127.0.0.11 valid=10s;

    # ── API proxy ────────────────────────────────────────────────────────
    set $api_upstream "http://api:8000";
    location /v1/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }

    # ── API docs (FastAPI automatic docs) ─────────────────────────────────
    location /docs {
        proxy_pass $api_upstream/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass $api_upstream/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health check (no logging) ─────────────────────────────────────────
    location /health {
        proxy_pass $api_upstream;
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Admin API ─────────────────────────────────────────────────────────
    location /admin/ {
        proxy_pass $api_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }

    # ── Frontend proxy (all other routes) ─────────────────────────────────
    set $frontend_upstream "http://frontend:3000";
    location / {
        proxy_pass $frontend_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }
}
