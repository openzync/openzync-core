# ──────────────────────────────────────────────────────────────────────────────
# OpenZep — HTTP reverse proxy (IP-based, no TLS)
# ──────────────────────────────────────────────────────────────────────────────
# Used when deploying without a domain name.  If you add a domain later,
# replace `server_name` and add the HTTPS server block from
# infra/nginx/conf.d/openzep.ssl.conf.
#
# Routing:
#   /v1/*, /docs, /openapi.json, /health → FastAPI backend (api:8000)
#   Everything else                      → Next.js frontend (frontend:3000)
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name _;  # Respond on any IP/domain

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Upstream resolver for variable proxy_pass ─────────────────────────
    resolver 127.0.0.11 valid=10s;

    # ── API proxy ────────────────────────────────────────────────────────
    location /v1/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }

    # ── API docs (FastAPI automatic docs) ─────────────────────────────────
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health check (no logging) ─────────────────────────────────────────
    location /health {
        proxy_pass http://api:8000;
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend proxy (all other routes) ─────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }
}
