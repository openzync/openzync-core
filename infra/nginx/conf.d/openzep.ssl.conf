# ──────────────────────────────────────────────────────────────────────────────
# OpenZep — HTTPS reverse proxy (Cloudflare Origin Certificate)
# ──────────────────────────────────────────────────────────────────────────────
# Used with Cloudflare proxy (orange cloud) in Full (Strict) SSL mode.
# Cloudflare terminates client TLS and re-encrypts to this server using the
# Cloudflare Origin CA certificate.
#
# Routing:
#   /v1/*, /docs, /openapi.json, /health → FastAPI backend (api:8000)
#   Everything else                      → Next.js frontend (frontend:3000)
# ──────────────────────────────────────────────────────────────────────────────

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name app.openzync.tech;

    # ── Cloudflare Origin Certificate ──────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/origin-cert.pem;
    ssl_certificate_key /etc/nginx/certs/origin-key.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # ── Security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Upstream resolver for variable proxy_pass ─────────────────────────
    resolver 127.0.0.11 valid=10s;

    # ── API proxy ────────────────────────────────────────────────────────
    location /v1/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;

        proxy_redirect off;
        proxy_buffering off;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }

    # ── API docs (FastAPI automatic docs) ─────────────────────────────────
    location /docs {
        proxy_pass http://api:8000/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /openapi.json {
        proxy_pass http://api:8000/openapi.json;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Health check (no logging) ─────────────────────────────────────────
    location /health {
        proxy_pass http://api:8000;
        access_log off;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Frontend proxy (all other routes) ─────────────────────────────────
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_connect_timeout 10s;
        proxy_send_timeout    30s;
        proxy_read_timeout    120s;
    }
}
