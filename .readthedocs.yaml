# ──────────────────────────────────────────────────────────────────────────────
# OpenZep — ReadTheDocs build configuration
# ──────────────────────────────────────────────────────────────────────────────
# This file controls how ReadTheDocs builds the Sphinx documentation site.
#
# Build process:
#   1. Create a Python 3.12 environment
#   2. Install dependencies from docs/requirements.txt  (sphinx, furo, …)
#   3. Install the project itself via ``pip install .``   (autodoc needs imports)
#   4. Run ``sphinx-build -b html docs/ $READTHEDOCS_OUTPUT/html``
# ──────────────────────────────────────────────────────────────────────────────

version: 2

build:
  os: ubuntu-22.04
  tools:
    python: "3.12"

sphinx:
  configuration: docs/conf.py
  fail_on_warning: false  # TODO: switch to true once pre-existing docstring warnings are cleaned up

python:
  install:
    - requirements: docs/requirements.txt
    - method: pip
      path: .
