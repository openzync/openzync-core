# ──────────────────────────────────────────────────────────────────────────────
# OpenZync — GitHub Actions CI/CD pipeline
# ──────────────────────────────────────────────────────────────────────────────
# Stages:
#   lint            → ruff, mypy
#   test-unit       → pytest with coverage
#   test-integration → pytest with Postgres + Redis (testcontainers)
#   build           → Docker image (main/tags only) pushed to ghcr.io
#   deploy          → SSH into VPS, pull images, migrate, restart backend (main only)
#   sdk-publish     → PyPI (tags only)
# ──────────────────────────────────────────────────────────────────────────────

name: CI

on:
  push:
    branches: [master, develop]
    tags: ["v*"]
  pull_request:
    branches: [master]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: "Skip test jobs and deploy directly"
        type: boolean
        default: false

# Grant write permission to ghcr.io for the build job.
# The GITHUB_TOKEN defaults to read-only for packages — this elevates it.
permissions:
  contents: read
  packages: write
  id-token: write

env:
  PYTHON_VERSION: "3.12"
  OZ_DATABASE_URL: "postgresql+asyncpg://postgres:postgres@localhost:5432/test"
  OZ_REDIS_URL: "redis://localhost:6379/0"
  OZ_FALKORDB_URL: "redis://localhost:6380"
  OZ_SECRET_KEY: "ci-secret-key-that-is-at-least-32-chars!!"
  OZ_ENVIRONMENT: "testing"
  OZ_LOG_LEVEL: "WARNING"

jobs:
  # ═════════════════════════════════════════════════════════════════════════════
  # LINT
  # ═════════════════════════════════════════════════════════════════════════════
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install ruff mypy
      - run: ruff check . --output-format=github
      - run: ruff format --check .
      - run: pip install -e ".[dev]" && mypy core/ middleware/ dependencies/ routers/ models/ schemas/ services/

  # ═════════════════════════════════════════════════════════════════════════════
  # UNIT TESTS
  # ═════════════════════════════════════════════════════════════════════════════
  test-unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: pip install -e ".[dev]"
      - run: pytest tests/unit/ -v --timeout=30 --cov=core --cov=middleware --cov=dependencies --cov-report=term --cov-report=xml
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ═════════════════════════════════════════════════════════════════════════════
  # INTEGRATION TESTS
  # ═════════════════════════════════════════════════════════════════════════════
  test-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
      - run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          PGPASSWORD=postgres psql -h localhost -U postgres -c "CREATE DATABASE test;" || true
      - run: pip install -e ".[dev]"
      - run: alembic upgrade head
      - run: |
          pytest tests/integration/ -v --timeout=60 \
            --cov=services --cov-report=term \
            --ignore=tests/integration/test_enrichment_pipeline.py
      - uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  # ═════════════════════════════════════════════════════════════════════════════
  # BUILD  (Docker image — main and tags only)
  # ═════════════════════════════════════════════════════════════════════════════
  build-backend:
    if: github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: tag
        run: |
          if [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="${{ github.sha }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Building backend with tag: $TAG"
      - run: |
          TAG="${{ steps.tag.outputs.tag }}"
          docker build -t ghcr.io/${{ github.repository }}/api:$TAG -f services/api/Dockerfile .
          docker build -t ghcr.io/${{ github.repository }}/worker:$TAG -f services/worker/Dockerfile .
          docker tag ghcr.io/${{ github.repository }}/api:$TAG ghcr.io/${{ github.repository }}/api:latest
          docker tag ghcr.io/${{ github.repository }}/worker:$TAG ghcr.io/${{ github.repository }}/worker:latest
          docker push --all-tags ghcr.io/${{ github.repository }}/api
          docker push --all-tags ghcr.io/${{ github.repository }}/worker


  # ═════════════════════════════════════════════════════════════════════════════
  # DEPLOY  (VPS — main branch only)
  # ═════════════════════════════════════════════════════════════════════════════
  deploy:
    if: github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build-backend]
    steps:
      - uses: actions/checkout@v4

      - name: Upload deployment files to VPS
        shell: bash
        run: |
          # Prepare SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          HOST="${{ secrets.VPS_HOST }}"
          USER="${{ secrets.VPS_USER }}"
          TARGET="/home/deploy/openzync"

          # Ensure target directory exists on VPS
          ssh -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            "${USER}@${HOST}" "mkdir -p ${TARGET}"

          # Create tar archive of deployment files (runs on runner — resolves correctly)
            tar czf /tmp/deploy-files.tar.gz \
              infra/docker-compose.backend.yml \
              infra/Dockerfile.openbao-tooling \
              infra/openbao/ \
              infra/nginx/conf.d/ \
              scripts/

          # Upload via SCP directly
          scp -i ~/.ssh/id_ed25519 \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            /tmp/deploy-files.tar.gz \
            "${USER}@${HOST}:${TARGET}/"

      - name: Extract and run deployment
        uses: appleboy/ssh-action@v1.0.3
        env:
          GHCR_PAT: ${{ secrets.GHCR_PAT }}
          OZ_DATABASE_URL: ${{ secrets.OZ_DATABASE_URL }}
          OZ_SECRET_KEY: ${{ secrets.OZ_SECRET_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          BAO_STATIC_SEAL_KEY: ${{ secrets.BAO_STATIC_SEAL_KEY }}
          OZ_WEBHOOK_SIGNING_SECRET: ${{ secrets.OZ_WEBHOOK_SIGNING_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: GHCR_PAT,OZ_DATABASE_URL,OZ_SECRET_KEY,VPS_HOST,BAO_STATIC_SEAL_KEY,OZ_WEBHOOK_SIGNING_SECRET
          script: |
            # Log in to ghcr.io so Docker can pull our private images
            echo "$GHCR_PAT" | docker login ghcr.io -u rohnsha0 --password-stdin
            cd /home/deploy/openzync
            # Remove stale infra dir to avoid file-level permission conflicts
            rm -rf infra
            tar xzf deploy-files.tar.gz
            rm deploy-files.tar.gz

            # ── Create .env from template + secrets (at project root, both ──
            #    compose files reference it via env_file: ../.env)
            cat > .env << ENVEOF
            OZ_DATABASE_URL=$OZ_DATABASE_URL
            OZ_REDIS_URL=redis://redis:6379/0
            OZ_SECRET_KEY=$OZ_SECRET_KEY
            OZ_ENVIRONMENT=production
            OZ_LOG_LEVEL=INFO
            OZ_CORS_ORIGINS=http://$VPS_HOST,http://localhost:3100,https://app.openzync.tech
            OZ_HOSTS_ALLOWED=$VPS_HOST,localhost,app.openzync.tech
            OZ_GRAPH_BACKEND=postgres
            OZ_CONTEXT_CACHE_TTL=30
            OZ_RATE_LIMIT_IP_MAX=60
            OZ_RATE_LIMIT_WINDOW_SEC=60
            OZ_JWT_ACCESS_TOKEN_TTL_MINUTES=30
            OZ_JWT_REFRESH_TOKEN_TTL_DAYS=7
            OZ_EMBEDDING_BACKEND=ollama
            OZ_EMBEDDING_MODEL=nomic-embed-text
            OZ_EMBEDDING_DIM=768
            BAO_STATIC_SEAL_KEY=$BAO_STATIC_SEAL_KEY
            OZ_WEBHOOK_SIGNING_SECRET=$OZ_WEBHOOK_SIGNING_SECRET
            ENVEOF

            # ── Deploy backend: pull → migrate → restart ───────────────────
            docker compose -f infra/docker-compose.backend.yml pull
            docker compose -f infra/docker-compose.backend.yml run --rm --no-deps api alembic upgrade head || true
            # --pull always: use pre-built ghcr.io images; build openbao-tooling locally
            docker compose -f infra/docker-compose.backend.yml up -d --pull always

            # ── Reload nginx so it resolves new container IPs ──────────────
            # nginx -s reload forces re-resolution of upstream hostnames
            # (api).  Frontend is deployed and reloaded independently via
            # its own CI pipeline (openzync-frontend).  Without a reload
            # nginx caches the old container IP and returns 502.
            docker exec infra-nginx-1 nginx -s reload || true

  # ═════════════════════════════════════════════════════════════════════════════
  # SDK PUBLISH  (PyPI — tags only)
  # ═════════════════════════════════════════════════════════════════════════════
  sdk-publish:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [test-unit]
    defaults:
      run:
        working-directory: oss/sdk-python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: oss/sdk-python/dist/
